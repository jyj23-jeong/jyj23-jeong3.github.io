<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="site-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">
          <span class="icon">🤖</span> {{ site.title }}
        </a>
        <div class="nav-links">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </div>
      </nav>
      <p class="site-tagline">{{ site.description }}</p>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        &copy; {{ site.time | date: "%Y" }} {{ site.title }} &mdash;
        AI news automatically scraped and summarized daily.
        <a href="{{ '/feed.xml' | relative_url }}">RSS Feed</a>
      </p>
    </div>
  </footer>
</body>
</html>
