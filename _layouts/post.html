---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-date">📅 {{ page.date | date: "%B %-d, %Y" }}</span>
      {% if page.author %}
      <span class="post-author">🤖 {{ page.author }}</span>
      {% endif %}
      {% if page.source_count %}
      <span class="post-sources">📰 {{ page.source_count }} sources</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link">← Back to all posts</a>
  </footer>
</article>
