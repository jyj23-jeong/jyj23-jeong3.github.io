name: Daily AI News Digest

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    name: Scrape AI news and publish digest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run AI news scraper
        run: python scripts/scraper.py

      - name: Check for new posts
        id: changes
        run: |
          git add _posts/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new posts generated (no new articles found)."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New post(s) detected."
          fi

      - name: Commit and push new digest
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "AI Trend Bot"
          git config user.email "ai-trend-bot@users.noreply.github.com"
          git commit -m "chore: daily AI news digest $(date -u '+%Y-%m-%d')"
          git push
